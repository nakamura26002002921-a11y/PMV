name: pmv_calc_env

channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10.20

  # Python libs
  - numpy
  - scipy
  - mdanalysis

  # Build tools
  - cmake
  - make
  - compilers

  # C++ dependencies
  - cgal=5.6
  - eigen=3.4.0
  - boost=1.84.0
  - gmp
  - mpfr

  # pybind11
  - pybind11=2.11

  # optional（可視化など）
  - pymol-open-source
